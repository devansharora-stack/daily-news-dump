name: Daily AI Digest

on:
  # Triggered by an external scheduler (cron-job.org) via the workflow_dispatch
  # API at 03:30 UTC / 9 AM IST. GitHub's native cron was unreliable (queued and
  # delayed by hours), so the schedule trigger was removed.
  workflow_dispatch: # External scheduler + manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer + Playwright browsers
        run: |
          npx puppeteer browsers install chrome
          npx playwright install chromium --with-deps

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_FOUNDRY_RESOURCE: ${{ secrets.ANTHROPIC_FOUNDRY_RESOURCE }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: npm start

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: |
            digests/*.pdf
            digests/*.html
            digests/*.json
          retention-days: 30

      - name: Commit digest to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          git add -f digests/ data/
          git diff --staged --quiet && echo "No new digest to commit" && exit 0
          git commit -m "Daily digest: ${DATE}"
          git push
