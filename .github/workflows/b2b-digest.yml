name: B2B Marketing Weekly Sprint

on:
  schedule:
    # Sunday 2 AM UTC (7:30 AM IST) — weekly planner: fetch articles + plan the week
    - cron: "0 2 * * 0"
    # Daily 3:30 AM UTC (9 AM IST) — daily runner: generate key notes/recaps
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Which mode to run"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - plan-week

permissions:
  contents: write

jobs:
  b2b-sprint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write GCP credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "step=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "7" ]; then
            echo "step=plan-week" >> $GITHUB_OUTPUT
          else
            echo "step=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run weekly planner
        if: steps.mode.outputs.step == 'plan-week'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_FOUNDRY_RESOURCE: ${{ secrets.ANTHROPIC_FOUNDRY_RESOURCE }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: us-central1
        run: npm run b2b:plan

      - name: Run daily digest
        if: steps.mode.outputs.step == 'daily'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_FOUNDRY_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          ANTHROPIC_FOUNDRY_RESOURCE: ${{ secrets.ANTHROPIC_FOUNDRY_RESOURCE }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: us-central1
        run: npm run b2b

      - name: Commit to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          git add -f b2b-digests/ data/
          git diff --staged --quiet && echo "No new B2B content to commit" && exit 0
          git commit -m "B2B sprint: ${DATE} (${{ steps.mode.outputs.step }})"
          git pull --rebase
          git push
